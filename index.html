<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>WebAR 透明啟動測試</title>
    
    <script src="./libs/aframe.min.js"></script>
    <script src="./libs/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        
        /* 透明啟動層：全螢幕隱形玻璃，點擊解鎖權限 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0); /* 全透明 */
            z-index: 9999;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="overlay"></div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterMinCF:0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="testVideo" src="./your-video.mp4" 
                preload="auto" loop="true" 
                crossorigin="anonymous" playsinline>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        </a-scene>

    <script>
        const video = document.querySelector('#testVideo');
        const overlay = document.querySelector('#overlay');
        const sceneEl = document.querySelector('a-scene');

        const targetCount = 5; 

        // 自動產生 5 個偵測目標
        for (let i = 0; i < targetCount; i++) {
            const entity = document.createElement('a-entity');
            entity.setAttribute('mindar-image-target', `targetIndex: ${i}`);
            
            const videoObj = document.createElement('a-video');
            videoObj.setAttribute('src', '#testVideo');
            videoObj.setAttribute('position', '0 0 0');
            videoObj.setAttribute('height', '0.56');
            videoObj.setAttribute('width', '1');

            entity.appendChild(videoObj);
            sceneEl.appendChild(entity);

            entity.addEventListener("targetFound", event => {
                video.play();
            });

            entity.addEventListener("targetLost", event => {
                video.pause();
            });
        }

        // 點擊隱形層解鎖
        overlay.addEventListener('click', () => {
            overlay.style.display = 'none'; // 點擊後移除隱形牆
            video.play().then(() => {
                video.pause();
                video.currentTime = 0;
            }).catch(err => {
                console.error("解鎖失敗:", err);
            });
        });
    </script>
</body>
</html>
