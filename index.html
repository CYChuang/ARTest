<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR 影片疊加測試</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
    /* 製作一個漂亮的啟動覆蓋層 */
    #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0);
        color: white;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
        cursor: pointer;
    }    
</style>
</head>
<body>

    <!-- <div id="overlay">
        <div class="scan-icon"></div>
        <p>點擊螢幕開啟 AR 體驗</p>
    </div> -->

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="arVideo" src="./your-video.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#arVideo" width="1" height="0.56" position="0 0 0" rotation="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const overlay = document.querySelector('#overlay');
        const video = document.querySelector('#arVideo');

        // 點擊全螢幕任何地方
        overlay.addEventListener('click', () => {
            // 1. 隱藏覆蓋層
            overlay.style.display = 'none';
            
            // 2. 關鍵：在使用者點擊的當下「預熱」影片
            // 這會告訴瀏覽器：這個影片已經獲得授權可以播放了
            video.play().then(() => {
                video.pause(); // 立即暫停，等待掃描到圖片再播
            }).catch(err => {
                console.log("影片預熱失敗:", err);
            });
        });

        // 掃描到圖片的邏輯保持不變
        const targetEntity = document.querySelector('#target');
        targetEntity.addEventListener("targetFound", event => {
            video.play();
        });
    </script>
</body>
</html>
